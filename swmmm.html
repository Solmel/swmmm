<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>swmmm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f5;
      --sub: #888;
      --wa: #25D366;
      --tg: #2AABEE;
      --ig1: #f9ce34;
      --ig2: #ee2a7b;
      --ig3: #6228d7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* animated background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #25D366, transparent);
      top: -100px;
      left: -100px;
      animation: drift1 8s ease-in-out infinite alternate;
    }

    body::after {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #ee2a7b, transparent);
      bottom: -80px;
      right: -80px;
      animation: drift2 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      to {
        transform: translate(60px, 80px);
      }
    }

    @keyframes drift2 {
      to {
        transform: translate(-60px, -80px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--wa), var(--tg), var(--ig2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 40px rgba(37, 211, 102, 0.3);
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--sub);
      margin-top: -4px;
      margin-bottom: 10px;
    }

    .link-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      animation: fadeUp 0.7s ease both;
    }

    .link-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .link-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .link-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .link-card:hover {
      transform: translateY(-3px) scale(1.01);
    }

    .link-card.whatsapp:hover {
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.25);
      border-color: rgba(37, 211, 102, 0.4);
    }

    .link-card.telegram:hover {
      box-shadow: 0 8px 32px rgba(42, 171, 238, 0.25);
      border-color: rgba(42, 171, 238, 0.4);
    }

    .link-card.instagram:hover {
      box-shadow: 0 8px 32px rgba(238, 42, 123, 0.25);
      border-color: rgba(238, 42, 123, 0.4);
    }

    .icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .whatsapp .icon-wrap {
      background: rgba(37, 211, 102, 0.15);
    }

    .telegram .icon-wrap {
      background: rgba(42, 171, 238, 0.15);
    }

    .instagram .icon-wrap {
      background: linear-gradient(135deg, rgba(249, 206, 52, 0.15), rgba(238, 42, 123, 0.15), rgba(98, 40, 215, 0.15));
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
    }

    .info {
      flex: 1;
    }

    .info .name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .info .handle {
      font-size: 0.78rem;
      color: var(--sub);
      margin-top: 2px;
    }

    .arrow {
      color: var(--sub);
      font-size: 1.2rem;
      transition: transform 0.18s ease;
    }

    .link-card:hover .arrow {
      transform: translateX(4px);
    }

    .footer {
      margin-top: 8px;
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.05em;
      animation: fadeUp 0.7s 0.5s ease both;
    }
  </style>
</head>
